<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Sales Ledger</title>
    <style>
        /* CSS Murni Pengganti Tailwind Biar Tetap Cakep Saat Offline */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 0 1.5rem;
        }
        .card {
            max-width: 28rem;
            width: 100%;
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }
        .icon-container {
            width: 5rem;
            height: 5rem;
            background-color: #fef2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
        }
        .icon {
            width: 2.5rem;
            height: 2.5rem;
            color: #ef4444;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        button {
            width: 100%;
            background-color: #0F47A1;
            color: #ffffff;
            font-weight: 700;
            padding: 0.875rem;
            border: none;
            border-radius: 1rem;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0c3882;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Yah, Koneksi Terputus!</h1>
        <p>Sepertinya kamu sedang offline. Silakan periksa koneksi internetmu lalu coba lagi.</p>
        <button onclick="window.location.reload()">Coba Muat Ulang</button>
    </div>
</body>
</html>
